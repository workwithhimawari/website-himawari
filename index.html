<!doctype html>
<html lang="id">  <!-- ganti ke id biar sesuai bahasa utama -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title tab browser -->
    <title>Himawari Official</title>  <!-- atau "Hmawari Official" sesuai yang kamu mau -->
    
    <!-- Favicon pakai PNG-mu -->
    <link rel="icon" href="/WITHOUT TEXT.png" type="image/png" />
    
    <!-- Biar bagus di bookmark HP/iPhone -->
    <link rel="apple-touch-icon" href="/WITHOUT TEXT.png" />
    
    <!-- Opsional: tambah ukuran spesifik biar tajam di high-res screen -->
    <link rel="icon" href="/WITHOUT TEXT.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/WITHOUT TEXT.png" sizes="64x64" type="image/png" />
    <link rel="icon" href="/WITHOUT TEXT.png" sizes="180x180" type="image/png" />

    <!-- Hapus atau ganti meta OG/Twitter kalau mau (biar ga pakai Lovable) -->
    <meta property="og:title" content="Himawari Official" />
    <meta property="og:description" content="Official website Himawari" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/WITHOUT TEXT.png" />  <!-- pakai logo-mu juga -->
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Himawari Official" />
    <meta name="twitter:image" content="/WITHOUT TEXT.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
